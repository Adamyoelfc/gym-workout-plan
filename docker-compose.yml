services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shred}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shred}
      POSTGRES_DB: ${POSTGRES_DB:-shred}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Runs only on an empty data volume (first boot).
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shred} -d ${POSTGRES_DB:-shred}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-shred}:${POSTGRES_PASSWORD:-shred}@db:5432/${POSTGRES_DB:-shred}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  db_data:
